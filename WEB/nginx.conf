server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # gzip for HTML/CSS/JS — small page, big effect on first paint
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ─── Legacy Duda runtime stubs ──────────────────────────────────────────
    # The /old/ snapshot was mirrored from a live Duda site. Its bundled
    # runtime tries to lazy-load extra chunks and POST analytics back to
    # paths that only exist on Duda's servers. Return harmless empty
    # responses so the browser console stays clean.

    # Lazy-loaded Webpack chunks (animations, anchor scroll, widgets)
    location ^~ /editor/apps/modules/runtime/ {
        return 204;
    }
    # Duda action/analytics endpoints
    location ^~ /_dm/s/rt/actions/ {
        return 204;
    }
    # Service worker the snapshot tries to register at site root.
    # Return a valid no-op SW so registration succeeds quietly instead of
    # logging "SW registration failed" each pageload.
    location = /runtime-service-worker.js {
        default_type application/javascript;
        add_header Cache-Control "no-cache" always;
        return 200 "self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>self.clients.claim());";
    }

    # Long cache for assets, no cache for HTML so client always sees latest
    location ~* \.(?:css|js|jpg|jpeg|png|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
